name: Unit tests (Day 3, Level 1)

# Прогоняет код-тесты (JUnit5, ./gradlew test) на каждый PR — Уровень 1 из задания
# Advanced-курса День 3. Уровень 2 (smoke через Playwright MCP) в CI не гоняется
# намеренно: сервис требует локальной Ollama и реального браузера-агента, GitHub-раннер
# для этого не подходит — smoke-прогон делает агент локально по требованию
# (см. .claude/skills/day3-full-check/SKILL.md).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run unit tests
        id: test
        run: |
          chmod +x gradlew
          ./gradlew test --console=plain

      - name: Comment result on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            STATUS="✅ Все код-тесты прошли (Уровень 1, День 3)"
          else
            STATUS="❌ Код-тесты упали (Уровень 1, День 3) — см. лог шага \`Run unit tests\`"
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body "$STATUS" --repo ${{ github.repository }}
